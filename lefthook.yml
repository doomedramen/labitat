# Lefthook configuration
# See: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm lint --fix {staged_files}
      stage_fixed: true
    format:
      glob: "*.{ts,tsx,js,jsx,md,json}"
      run: pnpm format --write {staged_files}
      stage_fixed: true
    version-bump:
      run: npx -y package-bump@latest patch --stage
      stage_fixed: true

pre-push:
  parallel: false
  commands:
    typecheck:
      run: pnpm typecheck
    check-adapters:
      run: pnpm check-adapters
    check-doc-coverage:
      run: pnpm check-doc-coverage
    e2e-tests:
      run: pnpm test:e2e
    build:
      run: pnpm build

