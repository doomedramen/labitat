# Lefthook configuration
# See: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: false
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: pnpm lint:fix {staged_files}
      stage_fixed: true
    format:
      glob: "*.{ts,tsx,js,jsx,md,json}"
      run: pnpm format --write {staged_files}
      stage_fixed: true
    generate-migration:
      glob: "src/lib/db/schema.ts"
      run: npx drizzle-kit generate
    version-bump:
      run: npx -y package-bump@1.1.7 patch --stage
      stage_fixed: true

pre-push:
  parallel: false
  commands:
    typecheck:
      run: pnpm typecheck
    test:
      run: pnpm test
    check-adapters:
      run: pnpm check-adapters
    check-doc-coverage:
      run: pnpm check-doc-coverage
    build:
      run: pnpm build

