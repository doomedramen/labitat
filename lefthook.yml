# Lefthook configuration
# See: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: false
  commands:
    lint:
      glob: "*.{ts,tsx,js,jsx}"
      run: npx oxlint {staged_files}
      stage_fixed: true
    format:
      glob: "*.{ts,tsx,js,jsx,md,json}"
      run: npx oxfmt {staged_files}
      stage_fixed: true
    generate-icons:
      glob: "logo.svg"
      run: pnpm generate-icons
      stage_fixed: true
    generate-migration:
      glob: "src/lib/db/schema.ts"
      run: npx drizzle-kit generate
pre-push:
  parallel: false
  commands:
    typecheck:
      run: pnpm typecheck
    test:
      run: pnpm test
    audit:
      run: pnpm audit
    check-adapters:
      run: pnpm check-adapters
    check-doc-coverage:
      run: pnpm check-doc-coverage
    build:
      run: pnpm build
