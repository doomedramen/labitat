# Lefthook configuration for auto version bumping
# See: https://github.com/evilmartians/lefthook

pre-commit:
  parallel: true
  commands:
    lint:
      run: pnpm lint
      stage_fixed: true
    format:
      run: pnpm format
      stage_fixed: true
    typecheck:
      run: pnpm typecheck
    check-adapters:
      run: pnpm check-adapters

pre-push:
  parallel: false
  commands:
    build:
      run: pnpm build

