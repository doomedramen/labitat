services:
  labitat:
    image: ghcr.io/doomedramen/labitat:latest
    container_name: labitat
    restart: unless-stopped
    ports:
      - "3000:3000"
    volumes:
      - labitat_data:/data

    environment:
      # Optional: set your own key, or let Labitat generate one automatically
      # To set: export SECRET_KEY=$(openssl rand -base64 32) before running
      - SECRET_KEY=${SECRET_KEY:-}
      - NODE_ENV=production
      - DATABASE_URL=file:/data/labitat.db
      # Optional: customize port
      # - PORT=3000
      # Cache directory for widget cache persistence
      - CACHE_DIR=/data/cache

    healthcheck:
      test: ["CMD", "node", "-e", "require('http').get('http://localhost:3000/api/health', (r) => process.exit(r.statusCode === 200 ? 0 : 1))"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

    # Security hardening
    security_opt:
      - no-new-privileges:true
    # read_only: true is safe — /data (named volume) and /tmp (tmpfs) cover all write paths
    read_only: true
    tmpfs:
      - /tmp

volumes:
  labitat_data:
    name: labitat_data
